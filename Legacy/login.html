<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 앱</title>
    <!-- 폭죽 효과를 위한 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="glass-container">
        <!-- 로그인 아이콘 -->
        <div class="icon-container">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
        </div>

        <h2>환영합니다</h2>
        <p class="subtitle">계정에 로그인하세요</p>

        <form action="#" method="POST" class="auth-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="email">이메일</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>

            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="options-group">
                <label class="checkbox-container">
                    <input type="checkbox">
                    로그인 유지
                </label>
                <a href="#" class="forgot-link">비밀번호 찾기</a>
            </div>

            <button type="submit" class="submit-btn">로그인</button>
        </form>

        <p class="switch-page">계정이 없으신가요? <a onclick="goToSignup()" style="cursor: pointer;">회원가입</a></p>
    </div>
    <script src="script.js"></script>
</body>

</html>
