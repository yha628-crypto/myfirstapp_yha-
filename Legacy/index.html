<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container" style="text-align: center;">
        <!-- style.css의 glass-container 클래스를 활용하여 디자인 통일감을 줍니다 -->
        <div class="card glass-container">
            <h2>🙌Welcome🙌</h2>
            <p class="subtitle">계속하려면 로그인하거나 회원가입하세요.</p>
            <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem;">
                <!-- submit-btn 클래스를 추가하여 버튼 스타일을 입힙니다 -->
                <button type="button" onclick="goToLogin()" class="btn submit-btn"
                    style="display: block; width: 100%; border: none; font-size: 16px; font-weight: 600; cursor: pointer;">로그인
                    페이지로 이동</button>
                <button type="button" onclick="goToSignup()" class="btn submit-btn"
                    style="display: block; width: 100%; border: none; font-size: 16px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: #1a172c;">
                    회원가입 페이지로 이동</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
